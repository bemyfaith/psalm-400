<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赞美诗简谱生成器</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 30px;
        }
        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        button {
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }
        .preview {
            margin: 20px 0;
            padding: 20px;
            background: #fafafa;
            border-radius: 8px;
        }
        canvas {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            background: #fff;
        }
        .output {
            margin-top: 20px;
        }
        .output img {
            max-width: 100%;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 赞美诗简谱高清生成器</h1>
        
        <div class="controls">
            <button onclick="generateSample()">生成示例</button>
            <button onclick="downloadAll()">批量下载</button>
            <button onclick="exportData()">导出数据</button>
        </div>
        
        <div class="preview">
            <h3>预览：</h3>
            <canvas id="jianpuCanvas" width="760" height="400"></canvas>
        </div>
        
        <div class="output" id="output"></div>
    </div>
    
    <script>
        const canvas = document.getElementById('jianpuCanvas');
        const ctx = canvas.getContext('2d');
        
        // 简谱配置
        const CONFIG = {
            fontSize: 32,
            lineHeight: 60,
            noteSpacing: 35,
            barSpacing: 15,
            margin: 40,
            sharpColor: '#e74c3c',
            flatColor: '#3498db',
            noteColor: '#2c3e50',
            barColor: '#667eea'
        };
        
        // 生成示例简谱
        function generateSample() {
            const hymnData = {
                title: "圣哉三一歌",
                number: 1,
                key: "1=D",
                time: "4/4",
                tempo: "庄严地",
                music: "5 1' 7 6 | 5 3 5 - | 6 6 5 3 | 2 3 2 - | 1 2 3 3 | 2 1 2 - | 3 5 5 6 | 5 - - - ||"
            };
            
            renderJianpu(hymnData);
        }
        
        // 渲染简谱
        function renderJianpu(hymnData) {
            // 清空画布
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制标题
            ctx.fillStyle = '#667eea';
            ctx.font = 'bold 24px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(`第${hymnData.number}首 ${hymnData.title}`, canvas.width / 2, 35);
            
            // 绘制调号、拍号、速度
            ctx.fillStyle = '#888';
            ctx.font = '14px Arial';
            ctx.textAlign = 'left';
            ctx.fillText(`${hymnData.key}  ${hymnData.time}  ${hymnData.tempo}`, CONFIG.margin, 35);
            
            // 解析简谱
            const lines = parseMusic(hymnData.music);
            
            // 绘制每一行
            let y = CONFIG.margin + 40;
            lines.forEach((line, lineIndex) => {
                drawMusicLine(line, y);
                y += CONFIG.lineHeight;
            });
            
            // 导出图片
            exportImage();
        }
        
        // 解析简谱字符串
        function parseMusic(musicStr) {
            const lines = [];
            let currentLine = [];
            let currentMeasure = [];
            
            const tokens = musicStr.trim().split(/\s+/);
            
            tokens.forEach(token => {
                if (token === '|' || token === '‖') {
                    if (currentMeasure.length > 0) {
                        currentLine.push({ type: 'measure', notes: currentMeasure });
                        currentMeasure = [];
                    }
                    currentLine.push({ type: 'bar', style: token === '‖' ? 'double' : 'single' });
                } else {
                    currentMeasure.push(parseNote(token));
                }
            });
            
            if (currentMeasure.length > 0) {
                currentLine.push({ type: 'measure', notes: currentMeasure });
            }
            
            lines.push(currentLine);
            return lines;
        }
        
        // 解析单个音符
        function parseNote(token) {
            const note = {
                pitch: token[0],
                octave: 'normal',
                duration: 0.5,
                sharp: false,
                flat: false
            };
            
            // 检查升降号
            if (token.startsWith('#')) {
                note.sharp = true;
                note.pitch = token[1];
            } else if (token.startsWith('b') || token.startsWith('♭')) {
                note.flat = true;
                note.pitch = token[1];
            }
            
            // 检查高低音
            for (let i = 1; i < token.length; i++) {
                if (token[i] === "'" || token[i] === '’') {
                    note.octave = 'high';
                } else if (token[i] === '.') {
                    note.octave = 'low';
                } else if (token[i] === '-') {
                    note.duration += 0.5;
                }
            }
            
            return note;
        }
        
        // 绘制一行简谱
        function drawMusicLine(line, y) {
            let x = CONFIG.margin;
            
            line.forEach(element => {
                if (element.type === 'bar') {
                    drawBarLine(x, y, element.style);
                    x += CONFIG.barSpacing;
                } else if (element.type === 'measure') {
                    element.notes.forEach(note => {
                        drawNote(note, x, y);
                        x += CONFIG.noteSpacing;
                    });
                }
            });
        }
        
        // 绘制小节线
        function drawBarLine(x, y, style) {
            ctx.strokeStyle = CONFIG.barColor;
            ctx.lineWidth = style === 'double' ? 3 : 2;
            
            const startY = y - 25;
            const endY = y + 25;
            
            ctx.beginPath();
            ctx.moveTo(x, startY);
            ctx.lineTo(x, endY);
            ctx.stroke();
            
            if (style === 'double') {
                ctx.beginPath();
                ctx.moveTo(x + 4, startY);
                ctx.lineTo(x + 4, endY);
                ctx.stroke();
            }
        }
        
        // 绘制音符
        function drawNote(note, x, y) {
            // 绘制升降号
            if (note.sharp) {
                ctx.fillStyle = CONFIG.sharpColor;
                ctx.font = 'bold 20px Arial';
                ctx.textAlign = 'right';
                ctx.fillText('♯', x - 5, y - 25);
            } else if (note.flat) {
                ctx.fillStyle = CONFIG.flatColor;
                ctx.font = 'bold 20px Arial';
                ctx.textAlign = 'right';
                ctx.fillText('♭', x - 5, y - 25);
            }
            
            // 绘制音符数字
            ctx.fillStyle = CONFIG.noteColor;
            ctx.font = 'bold 32px Arial';
            ctx.textAlign = 'center';
            
            const noteY = note.octave === 'high' ? y - 15 : 
                         note.octave === 'low' ? y + 15 : y;
            
            ctx.fillText(note.pitch, x, noteY);
            
            // 绘制高低音点
            if (note.octave === 'high') {
                drawDot(x, y - 35);
            } else if (note.octave === 'low') {
                drawDot(x, y + 35);
            }
            
            // 绘制延音线
            if (note.duration > 0.5) {
                ctx.fillStyle = CONFIG.noteColor;
                ctx.font = '24px Arial';
                ctx.fillText('−', x + 18, y);
            }
        }
        
        // 绘制高低音点
        function drawDot(x, y) {
            ctx.beginPath();
            ctx.arc(x, y, 3, 0, Math.PI * 2);
            ctx.fillStyle = CONFIG.noteColor;
            ctx.fill();
        }
        
        // 导出图片
        function exportImage() {
            const dataUrl = canvas.toDataURL('image/png');
            const output = document.getElementById('output');
            output.innerHTML = `
                <h3>导出的图片：</h3>
                <img src="${dataUrl}" alt="简谱">
                <br>
                <a href="${dataUrl}" download="jianpu.png" style="display:inline-block;margin-top:10px;padding:10px 20px;background:#667eea;color:#fff;text-decoration:none;border-radius:8px;">下载 PNG</a>
            `;
        }
        
        // 批量下载
        function downloadAll() {
            alert('批量下载功能开发中...');
        }
        
        // 导出数据
        function exportData() {
            const dataUrl = canvas.toDataURL('image/png');
            const base64 = dataUrl.split(',')[1];
            console.log('Base64:', base64.substring(0, 100) + '...');
            alert('图片数据已输出到控制台');
        }
        
        // 初始化
        generateSample();
    </script>
</body>
</html>
